<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repuestos — Taller Chapa y Pintura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="8" fill="#1a1a1a"/>
          <path d="M7 14h4l2-5 3 9 2-6 1 2h2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">Taller</span>
      </div>
      <nav>
        <button class="nav-item active" data-tab="cargar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Cargar repuesto
        </button>
        <button class="nav-item" data-tab="stock">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Ver stock
        </button>
      </nav>
      <div class="sidebar-footer">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">Sincronizado</span>
      </div>
    </aside>

    <main class="content">

      <!-- TAB: CARGAR -->
      <section id="tab-cargar" class="tab active">
        <div class="page-header">
          <h1>Nuevo repuesto</h1>
          <p>Completá los datos y guardá directo en la hoja.</p>
        </div>

        <div class="card form-card">
          <div class="form-group">
            <label for="nombre">Nombre del repuesto</label>
            <input type="text" id="nombre" placeholder="Ej: Paragolpe delantero, guardabarro izquierdo..." autocomplete="off" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="marca">Marca / Vehículo</label>
              <input type="text" id="marca" placeholder="Ej: Ford Focus 2018" autocomplete="off" />
            </div>
            <div class="form-group">
              <label for="cantidad">Cantidad</label>
              <input type="number" id="cantidad" placeholder="0" min="0" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="btn-guardar" onclick="guardar()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Guardar en Sheets
            </button>
          </div>
        </div>

        <div id="recent-wrap" style="display:none">
          <h2 class="section-title">Últimos cargados</h2>
          <div id="recent-list" class="recent-list"></div>
        </div>
      </section>

      <!-- TAB: STOCK -->
      <section id="tab-stock" class="tab">
        <div class="page-header">
          <h1>Stock actual</h1>
          <p>Todos los repuestos guardados en tu hoja.</p>
        </div>

        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="busqueda" placeholder="Buscar por nombre o marca..." oninput="filtrar()" />
          </div>
          <button class="btn btn-ghost" onclick="cargarDatos()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Actualizar
          </button>
        </div>

        <div id="stats-row" class="stats-row" style="display:none">
          <div class="stat-card">
            <span class="stat-label">Total repuestos</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Marcas distintas</span>
            <span class="stat-value" id="stat-marcas">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Unidades en stock</span>
            <span class="stat-value" id="stat-unidades">—</span>
          </div>
        </div>

        <div id="tabla-container">
          <div class="empty-state">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            <p>Hacé click en <strong>Actualizar</strong> para ver el stock.</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
